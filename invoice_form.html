<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturas — Tarjeta Corporativa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem}
.top-bar{width:100%;max-width:620px;display:flex;align-items:center;margin-bottom:1.5rem}
.logo-text{font-size:18px;font-weight:700;color:#1b1b1b;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:#888}
.card{background:#fff;border-radius:16px;border:1px solid #e8e8e5;padding:2rem;width:100%;max-width:620px;margin-bottom:1rem}
.section-title{font-size:13px;font-weight:700;color:#1b1b1b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:#fa345e;border-radius:2px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:11px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:0.4px}
input,select,textarea{width:100%;font-size:14px;padding:9px 11px;border:1.5px solid #e8e8e5;border-radius:8px;background:#fff;color:#1b1b1b;font-family:inherit;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#fa345e;box-shadow:0 0 0 3px rgba(250,52,94,0.08)}
textarea{resize:vertical;min-height:72px}
.amount-row{display:flex;gap:8px}
.amount-row select{width:90px;flex-shrink:0}
.amount-row input{flex:1}
.upload-area{border:1.5px dashed #d8d8d4;border-radius:8px;padding:1.1rem;text-align:center;cursor:pointer;color:#aaa;font-size:12px;background:#fff;transition:all 0.15s}
.upload-area:hover{border-color:#fa345e;color:#fa345e;background:#fff5f7}
.file-preview{display:none;align-items:center;gap:8px;padding:8px 11px;background:#f7f6fd;border:1.5px solid #b2a8e7;border-radius:8px;margin-top:8px;font-size:12px;color:#3d2fa8}
.file-preview .remove-file{margin-left:auto;cursor:pointer;color:#fa345e;font-size:11px;font-weight:700;white-space:nowrap}
.divider{height:1px;background:#f0f0ee;margin:20px 0}
.btn-submit{width:100%;background:#fa345e;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s}
.btn-submit:hover{background:#e0254e}
.btn-submit:disabled{background:#f7a0b1;cursor:not-allowed}
.msg{display:none;padding:12px 16px;border-radius:9px;font-size:14px;margin-top:10px;text-align:center;font-weight:500}
.msg.success{background:#edfaf3;color:#1a6b3c;border:1px solid #b2dfc5;display:block}
.msg.error{background:#fff1f3;color:#a0142a;border:1px solid #f5b2be;display:block}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{font-size:11px;color:#bbb;text-align:center;margin-top:0.5rem}
.required{color:#fa345e}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="logo-text">Facturas Corporativas</div>
    <div class="logo-sub">Registro de gastos pagados con tarjeta de crédito</div>
  </div>
</div>

<div class="card">
  <div class="section-title">Datos del trabajador</div>
  <div class="form-group">
    <label>Nombre completo <span class="required">*</span></label>
    <input type="text" id="nombre" placeholder="Ej: María González" autocomplete="name">
  </div>

  <div class="divider"></div>
  <div class="section-title">Detalle del gasto</div>

  <div class="form-group">
    <label>Descripción del servicio / compra <span class="required">*</span></label>
    <textarea id="descripcion" placeholder="Ej: Suscripción mensual a plataforma de diseño"></textarea>
  </div>

  <div class="form-row">
    <div class="form-group" style="margin-bottom:0">
      <label>Fecha del gasto <span class="required">*</span></label>
      <input type="date" id="fecha">
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>Categoría <span class="required">*</span></label>
      <select id="categoria">
        <option value="">Seleccionar...</option>
        <option>Transporte</option>
        <option>Alojamiento</option>
        <option>Alimentación</option>
        <option>Software / Suscripciones</option>
        <option>Equipamiento / Hardware</option>
        <option>Servicios profesionales</option>
        <option>Capacitación</option>
        <option>Marketing / Publicidad</option>
        <option>Otro</option>
      </select>
    </div>
  </div>

  <div style="height:14px"></div>

  <div class="form-group" style="margin-bottom:0">
    <label>Monto <span class="required">*</span></label>
    <div class="amount-row">
      <select id="moneda">
        <option value="">—</option>
        <option value="CLP">CLP</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="UF">UF</option>
        <option value="PEN">PEN</option>
        <option value="COP">COP</option>
        <option value="MXN">MXN</option>
      </select>
      <input type="number" id="monto" placeholder="0" min="0" step="any">
    </div>
  </div>
</div>

<div class="card">
  <div class="section-title">Factura adjunta</div>
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:4px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div>Adjuntar factura · PDF, JPG o PNG</div>
    <div style="font-size:11px;color:#bbb;margin-top:2px">Máximo 10 MB</div>
  </div>
  <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this.files[0])">
  <div class="file-preview" id="filePreview">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b2a8e7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="fileName">—</span>
    <span id="fileSize" style="color:#9b8fd9"></span>
    <span class="remove-file" onclick="removeFile()">Quitar</span>
  </div>
</div>

<div class="card">
  <button class="btn-submit" id="btnSubmit" onclick="enviar()">Enviar factura</button>
  <div class="msg" id="msg"></div>
</div>

<div class="footer">Uso interno · Los datos se envían de forma segura</div>

<script>
// ── CONFIGURACIÓN ──────────────────────────────────────────
const WEBHOOK_URL = 'https://TU_N8N_DOMINIO/webhook/facturas-corporativas';
// ──────────────────────────────────────────────────────────

let selectedFile = null;

// Drag & drop
const ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.style.borderColor='#fa345e'; ua.style.background='#fff5f7'; });
ua.addEventListener('dragleave', () => { ua.style.borderColor=''; ua.style.background=''; });
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.style.borderColor=''; ua.style.background='';
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(f) {
  if (!f) return;
  if (f.size > 10 * 1024 * 1024) { showMsg('El archivo supera el límite de 10 MB.', 'error'); return; }
  selectedFile = f;
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileSize').textContent = '(' + (f.size / 1024).toFixed(0) + ' KB)';
  document.getElementById('filePreview').style.display = 'flex';
  ua.style.display = 'none';
}

function removeFile() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').style.display = 'none';
  ua.style.display = 'block';
}

function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + type;
}

function validate() {
  const nombre = document.getElementById('nombre').value.trim();
  const desc   = document.getElementById('descripcion').value.trim();
  const fecha  = document.getElementById('fecha').value;
  const cat    = document.getElementById('categoria').value;
  const monto  = document.getElementById('monto').value;
  const moneda = document.getElementById('moneda').value;
  if (!nombre)  { showMsg('Ingresa tu nombre completo.', 'error'); return false; }
  if (!desc)    { showMsg('Ingresa una descripción del gasto.', 'error'); return false; }
  if (!fecha)   { showMsg('Selecciona la fecha del gasto.', 'error'); return false; }
  if (!cat)     { showMsg('Selecciona una categoría.', 'error'); return false; }
  if (!monto || parseFloat(monto) <= 0) { showMsg('Ingresa un monto válido.', 'error'); return false; }
  if (!moneda)  { showMsg('Selecciona la moneda.', 'error'); return false; }
  if (!selectedFile) { showMsg('Debes adjuntar la factura antes de enviar.', 'error'); return false; }
  return true;
}

async function enviar() {
  document.getElementById('msg').className = 'msg';
  if (!validate()) return;

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enviando...';

  // Generar ID único de registro
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const registroId = `FAC-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const timestamp = now.toLocaleString('es-CL');

  const fd = new FormData();
  fd.append('registro_id',  registroId);
  fd.append('timestamp',    timestamp);
  fd.append('nombre',       document.getElementById('nombre').value.trim());
  fd.append('descripcion',  document.getElementById('descripcion').value.trim());
  fd.append('fecha',        document.getElementById('fecha').value);
  fd.append('categoria',    document.getElementById('categoria').value);
  fd.append('monto',        document.getElementById('monto').value);
  fd.append('moneda',       document.getElementById('moneda').value);
  fd.append('archivo',      selectedFile);

  try {
    await fetch(WEBHOOK_URL, { method: 'POST', body: fd });
    showMsg('✅ Factura enviada correctamente. El registro ha sido guardado.', 'success');
    btn.innerHTML = '✓ Enviado';
    setTimeout(resetForm, 3000);
  } catch (err) {
    showMsg('❌ No se pudo conectar con el servidor. Verifica tu conexión.', 'error');
    btn.disabled = false;
    btn.innerHTML = 'Enviar factura';
  }
}

function resetForm() {
  ['nombre','descripcion','fecha','categoria','monto','moneda'].forEach(id => {
    document.getElementById(id).value = '';
  });
  removeFile();
  document.getElementById('msg').className = 'msg';
  const btn = document.getElementById('btnSubmit');
  btn.disabled = false;
  btn.innerHTML = 'Enviar factura';
}

// Fecha máxima = hoy
document.getElementById('fecha').max = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
